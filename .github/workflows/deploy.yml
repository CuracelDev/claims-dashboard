name: Deploy to GCP (PM2)

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_HEALTHOPS: ${{ secrets.SLACK_WEBHOOK_HEALTHOPS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_BASE_URL }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_USERNAME: ${{ secrets.METABASE_USERNAME }}
          METABASE_PASSWORD: ${{ secrets.METABASE_PASSWORD }}

      - name: Rsync files to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next,public,package.json,package-lock.json,next.config.js"
          target: "~/claims-dashboard"

      - name: Restart App via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/claims-dashboard
            cat <<EOF > .env
            DATABASE_URL="${{ secrets.DATABASE_URL }}"
            NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            SLACK_BOT_TOKEN="${{ secrets.SLACK_BOT_TOKEN }}"
            SLACK_WEBHOOK_HEALTHOPS="${{ secrets.SLACK_WEBHOOK_HEALTHOPS }}"
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
            AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}"
            AZURE_OPENAI_BASE_URL="${{ secrets.AZURE_OPENAI_BASE_URL }}"
            AZURE_OPENAI_API_VERSION="${{ secrets.AZURE_OPENAI_API_VERSION }}"
            METABASE_URL="${{ secrets.METABASE_URL }}"
            METABASE_USERNAME="${{ secrets.METABASE_USERNAME }}"
            METABASE_PASSWORD="${{ secrets.METABASE_PASSWORD }}"
            EOF
            npm install --production
            pm2 restart claims-dashboard || pm2 start npm --name "claims-dashboard" -- start -- -p 3020
